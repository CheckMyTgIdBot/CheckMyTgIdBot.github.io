<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Telegram ID Checker</title>
    <!-- Tailwind CSS for utility styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Official Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* CSS Variable mapping to match Telegram's exact UI Theme */
        :root {
            --bg-color: var(--tg-theme-bg-color, #0f172a);
            --text-color: var(--tg-theme-text-color, #f8fafc);
            --hint-color: var(--tg-theme-hint-color, #94a3b8);
            --link-color: var(--tg-theme-link-color, #38bdf8);
            --button-color: var(--tg-theme-button-color, #0284c7);
            --button-text-color: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg-color: var(--tg-theme-secondary-bg-color, #1e293b);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Dynamic classes reflecting Telegram theme contexts */
        .tg-hint { color: var(--hint-color); }
        .tg-link { color: var(--link-color); }
        .tg-secondary-bg { background-color: var(--secondary-bg-color); }
        .tg-border { border-color: rgba(255, 255, 255, 0.08); }
        
        .profile-glow {
            box-shadow: 0 10px 25px -10px var(--button-color);
        }
        
        /* Smooth Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--secondary-bg-color);
            border-radius: 99px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between px-4 pb-6 pt-4 overflow-y-auto">

    <!-- Main App Container -->
    <main class="w-full max-w-md mx-auto space-y-6 flex-1 flex flex-col justify-center">
        
        <!-- Profile Frame -->
        <div class="flex flex-col items-center space-y-4">
            <div class="relative">
                <!-- Outer glow rings indicating premium status or normal theme -->
                <div class="absolute -inset-1.5 bg-gradient-to-tr from-[var(--button-color)] to-purple-500 rounded-full blur opacity-30"></div>
                <div class="relative">
                    <img 
                        id="user-avatar" 
                        src="" 
                        alt="Profile" 
                        class="w-28 h-28 rounded-full object-cover border-4 border-[var(--bg-color)] profile-glow mx-auto transition-transform duration-300 active:scale-95"
                    />
                    <!-- Dynamic verified/premium badge -->
                    <div id="premium-badge" class="absolute bottom-0 right-1 bg-[var(--button-color)] p-1.5 rounded-full border-2 border-[var(--bg-color)] text-[var(--button-text-color)] hidden">
                        <i data-lucide="star" class="w-3.5 h-3.5 fill-current"></i>
                    </div>
                </div>
            </div>

            <!-- Basic Name Tags -->
            <div class="text-center space-y-1">
                <h1 class="text-2xl font-bold tracking-tight">
                    <span id="first-name">Telegram</span> 
                    <span id="last-name" class="opacity-70">User</span>
                </h1>
                <p id="username" class="tg-link font-medium text-sm">@username</p>
                
                <!-- Dynamic copyable ID Badge -->
                <div class="inline-flex items-center space-x-2 tg-secondary-bg px-3.5 py-1.5 rounded-full border tg-border mt-2 active:opacity-75 transition-opacity cursor-pointer" onclick="copyUserId()">
                    <span id="user-id" class="text-xs font-mono font-bold tracking-wider">ID: ---------</span>
                    <i data-lucide="copy" class="w-3.5 h-3.5 tg-hint"></i>
                </div>
            </div>
        </div>

        <!-- Quick Info Blocks & Estimator Grid -->
        <div class="grid grid-cols-2 gap-3">
            <!-- Account Age Estimator Block -->
            <div class="tg-secondary-bg border tg-border rounded-2xl p-3 flex items-start space-x-2.5">
                <div class="p-2 bg-blue-500/10 rounded-xl text-blue-400">
                    <i data-lucide="calendar" class="w-4 h-4"></i>
                </div>
                <div>
                    <span class="text-[10px] tg-hint uppercase tracking-wider block font-semibold">Est. Created</span>
                    <span id="est-age" class="font-bold text-xs">Loading...</span>
                </div>
            </div>

            <!-- Premium Check Block -->
            <div class="tg-secondary-bg border tg-border rounded-2xl p-3 flex items-start space-x-2.5">
                <div class="p-2 bg-amber-500/10 rounded-xl text-amber-400">
                    <i data-lucide="award" class="w-4 h-4"></i>
                </div>
                <div>
                    <span class="text-[10px] tg-hint uppercase tracking-wider block font-semibold">Premium Status</span>
                    <span id="premium-status" class="font-bold text-xs">Standard</span>
                </div>
            </div>

            <!-- Platform Info -->
            <div class="tg-secondary-bg border tg-border rounded-2xl p-3 flex items-start space-x-2.5">
                <div class="p-2 bg-emerald-500/10 rounded-xl text-emerald-400">
                    <i data-lucide="smartphone" class="w-4 h-4"></i>
                </div>
                <div>
                    <span class="text-[10px] tg-hint uppercase tracking-wider block font-semibold">Client Platform</span>
                    <span id="user-platform" class="font-bold text-xs">Unknown</span>
                </div>
            </div>

            <!-- Language ISO -->
            <div class="tg-secondary-bg border tg-border rounded-2xl p-3 flex items-start space-x-2.5">
                <div class="p-2 bg-purple-500/10 rounded-xl text-purple-400">
                    <i data-lucide="globe" class="w-4 h-4"></i>
                </div>
                <div>
                    <span class="text-[10px] tg-hint uppercase tracking-wider block font-semibold">Language</span>
                    <span id="user-lang" class="font-bold text-xs">EN</span>
                </div>
            </div>
        </div>

        <!-- Interactive Actions Menu -->
        <div class="space-y-2">
            <button onclick="shareMyDetails()" class="w-full flex items-center justify-between p-3.5 rounded-xl tg-secondary-bg hover:opacity-90 active:scale-98 transition-all border tg-border">
                <div class="flex items-center space-x-3">
                    <div class="p-2 bg-sky-500/10 rounded-lg text-sky-400">
                        <i data-lucide="share-2" class="w-4 h-4"></i>
                    </div>
                    <span class="text-xs font-semibold">Share Account Card</span>
                </div>
                <i data-lucide="chevron-right" class="w-4 h-4 tg-hint"></i>
            </button>

            <!-- Diagnostic Expandable Header -->
            <div class="border tg-border rounded-xl tg-secondary-bg overflow-hidden">
                <button onclick="toggleDetails()" class="w-full flex items-center justify-between p-3.5 hover:opacity-95 transition-all">
                    <div class="flex items-center space-x-3">
                        <div class="p-2 bg-purple-500/10 rounded-lg text-purple-400">
                            <i data-lucide="terminal" class="w-4 h-4"></i>
                        </div>
                        <span class="text-xs font-semibold">Developer Session Data</span>
                    </div>
                    <i id="chevron-icon" data-lucide="chevron-down" class="w-4 h-4 tg-hint transition-transform duration-200"></i>
                </button>
                
                <!-- Expanded raw content -->
                <div id="details-panel" class="hidden border-t tg-border p-3.5 space-y-3 bg-black/20">
                    <p class="text-[10px] tg-hint">Below is the authentic cryptographically signed metadata transmitted by the Telegram Client.</p>
                    <div class="space-y-1">
                        <span class="text-[9px] uppercase tracking-wider tg-hint font-bold">Query Auth Date</span>
                        <div id="auth-date" class="font-mono text-xs break-all py-1 px-2 rounded bg-black/40 text-slate-300">N/A</div>
                    </div>
                    <div class="space-y-1">
                        <span class="text-[9px] uppercase tracking-wider tg-hint font-bold">Hash Signature</span>
                        <div id="hash-signature" class="font-mono text-xs break-all py-1 px-2 rounded bg-black/40 text-slate-300">N/A</div>
                    </div>
                    <div class="space-y-1">
                        <span class="text-[9px] uppercase tracking-wider tg-hint font-bold">Raw Payload</span>
                        <textarea id="raw-payload" readonly class="w-full h-24 font-mono text-[10px] bg-black/40 text-slate-400 p-2 rounded focus:outline-none resize-none border tg-border"></textarea>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Native styled toast banner -->
    <div id="custom-toast" class="opacity-0 translate-y-4 fixed bottom-6 left-6 right-6 tg-secondary-bg border tg-border p-3 rounded-xl shadow-2xl flex items-center space-x-3 transition-all duration-300 pointer-events-none z-50">
        <div class="p-1.5 bg-[var(--button-color)] rounded-lg text-[var(--button-text-color)]">
            <i data-lucide="check" class="w-4 h-4"></i>
        </div>
        <span id="toast-message" class="text-xs font-medium">Copied successfully</span>
    </div>

    <!-- Scripting & Analytics -->
    <script>
        lucide.createIcons();
        const tg = window.Telegram ? window.Telegram.WebApp : null;

        function showNotification(message) {
            const toast = document.getElementById('custom-toast');
            const text = document.getElementById('toast-message');
            text.textContent = message;
            
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 2200);
        }

        // Estimates registration year from typical ID milestones
        function estimateAccountCreation(uid) {
            const idNum = parseInt(uid, 10);
            if (isNaN(idNum)) return 'N/A';
            
            if (idNum < 10000000) return '2008 - 2011';
            if (idNum < 50000000) return '2012 - 2013';
            if (idNum < 150000000) return '2014 - 2015';
            if (idNum < 350000000) return '2016';
            if (idNum < 500000000) return '2017';
            if (idNum < 950000000) return '2018 - 2019';
            if (idNum < 1400000000) return '2020';
            if (idNum < 1900000000) return '2021';
            if (idNum < 5000000000) return '2022 - 2023';
            if (idNum < 7000000000) return '2024';
            return '2025 - 2026';
        }

        function copyUserId() {
            if (!tg?.initDataUnsafe?.user) return;
            const uid = tg.initDataUnsafe.user.id.toString();
            
            const textarea = document.createElement('textarea');
            textarea.value = uid;
            textarea.style.position = 'fixed';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showNotification(`Copied ID: ${uid}`);
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } catch (err) {
                showNotification("Could not copy ID");
            } finally {
                document.body.removeChild(textarea);
            }
        }

        function toggleDetails() {
            const panel = document.getElementById('details-panel');
            const icon = document.getElementById('chevron-icon');
            const isHidden = panel.classList.toggle('hidden');
            
            if (isHidden) {
                icon.style.transform = 'rotate(0deg)';
            } else {
                icon.style.transform = 'rotate(180deg)';
            }
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function shareMyDetails() {
            if (!tg?.initDataUnsafe?.user) return;
            const user = tg.initDataUnsafe.user;
            const text = encodeURIComponent(
                `📊 *My Telegram Identity Verification*\n\n` +
                `👤 Name: ${user.first_name} ${user.last_name || ''}\n` +
                `🆔 User ID: ${user.id}\n` +
                `📅 Registration Range: ${estimateAccountCreation(user.id)}\n` +
                `🌟 Premium status: ${user.is_premium ? 'Yes' : 'No'}`
            );
            
            // Fires Telegram share dialog safely
            tg.openTelegramLink(`https://t.me/share/url?url=${text}`);
        }

        window.addEventListener('DOMContentLoaded', () => {
            if (tg) {
                tg.expand();
                tg.ready();

                const user = tg.initDataUnsafe?.user;
                
                // Set native closing mechanisms
                if (tg.MainButton) {
                    tg.MainButton.setText("CLOSE CHECKER");
                    tg.MainButton.show();
                    tg.MainButton.onClick(() => {
                        tg.close();
                    });
                    tg.MainButton.setParams({
                        button_color: tg.themeParams.button_color || '#0284c7',
                        button_text_color: tg.themeParams.button_text_color || '#ffffff'
                    });
                }

                if (user) {
                    document.getElementById('first-name').textContent = user.first_name || 'Premium';
                    document.getElementById('last-name').textContent = user.last_name || '';
                    
                    if (user.username) {
                        document.getElementById('username').textContent = `@${user.username}`;
                    } else {
                        document.getElementById('username').classList.add('hidden');
                    }
                    
                    document.getElementById('user-id').textContent = `ID: ${user.id}`;
                    document.getElementById('user-lang').textContent = (user.language_code || 'en').toUpperCase();
                    document.getElementById('user-platform').textContent = (tg.platform || 'mobile').toUpperCase();
                    
                    // Display Age Estimation
                    document.getElementById('est-age').textContent = estimateAccountCreation(user.id);

                    // Premium Checking
                    if (user.is_premium) {
                        document.getElementById('premium-status').textContent = 'Premium User';
                        document.getElementById('premium-badge').classList.remove('hidden');
                    } else {
                        document.getElementById('premium-status').textContent = 'Standard';
                    }

                    // Populate diagnostic panels
                    if (tg.initDataUnsafe.auth_date) {
                        const dateVal = new Date(tg.initDataUnsafe.auth_date * 1000);
                        document.getElementById('auth-date').textContent = dateVal.toUTCString();
                    }
                    document.getElementById('hash-signature').textContent = tg.initDataUnsafe.hash || 'N/A';
                    document.getElementById('raw-payload').value = JSON.stringify(tg.initDataUnsafe, null, 2);

                    // Build user avatar
                    const avatarImg = document.getElementById('user-avatar');
                    if (user.photo_url) {
                        avatarImg.src = user.photo_url;
                    } else {
                        const initials = ((user.first_name || 'T')[0] + (user.last_name || 'G')[0]).toUpperCase();
                        avatarImg.src = `https://api.dicebear.com/7.x/initials/svg?seed=${initials}&backgroundType=gradientLinear&backgroundRotation=45`;
                    }
                } else {
                    // Failback mock
                    document.getElementById('first-name').textContent = 'Roberto';
                    document.getElementById('last-name').textContent = 'La Spina';
                    document.getElementById('username').textContent = '@roblsp';
                    document.getElementById('user-id').textContent = 'ID: 168069604';
                    document.getElementById('est-age').textContent = estimateAccountCreation('168069604');
                    document.getElementById('user-lang').textContent = 'IT';
                    document.getElementById('user-platform').textContent = 'ANDROID';
                    document.getElementById('user-avatar').src = 'https://api.dicebear.com/7.x/bottts/svg?seed=tele';
                }
            }
        });
    </script>
</body>
</html>
